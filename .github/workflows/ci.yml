name: ci

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  build_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler:
          - gcc:15
          - clang:22
          - clang:21
    container:
      image: "registry.gitlab.com/offa/docker-images/${{ matrix.compiler }}"
    name: "${{ matrix.compiler }}"
    steps:
      - uses: actions/checkout@main
      - uses: offa/conan-action@c53f2e20ee76d70775862fdc7d52f7f53e60062d
      - name: Build
        run: script/ci_build.sh


  build_windows:
    runs-on: windows-latest
    name: "msvc"
    steps:
      - uses: actions/checkout@main
      - uses: TheMrMilchmann/setup-msvc-dev@79dac248aac9d0059f86eae9d8b5bfab4e95e97c
        with:
          arch: x64
      - uses: offa/conan-action@c53f2e20ee76d70775862fdc7d52f7f53e60062d
      - name: Build
        run: script/ci_build.sh
        shell: bash


  formatting-check:
    name: "formatting"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
    - uses: jidicula/clang-format-action@654a770daa28443dd111d133e4083e21c1075674
      name: "Verify formatting"
      with:
        clang-format-version: 19

